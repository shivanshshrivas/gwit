name: Bug Report
description: Report a bug or unexpected behavior in gwit
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What is currently happening?
      placeholder: |
        1. Run `gwit <command>`
        2. Observe...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you using?
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Other)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of `node --version`"
      placeholder: e.g., v20.11.0
    validations:
      required: true

  - type: input
    id: gwit-version
    attributes:
      label: gwit Version
      description: "Output of `gwit --version`"
      placeholder: e.g., 0.2.0
    validations:
      required: true

  - type: input
    id: git-version
    attributes:
      label: Git Version
      description: "Output of `git --version`"
      placeholder: e.g., 2.43.0
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem (logs, error messages, repo structure, etc.)
      placeholder: Add any other context here...
    validations:
      required: false
